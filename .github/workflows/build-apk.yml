name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID unik'
        required: true
      mode:
        description: 'Build mode: debug atau release'
        required: true
        default: 'debug'
      chat_id:
        description: 'Telegram Chat ID tujuan kirim APK'
        required: true
      app_name:
        description: 'Nama aplikasi'
        required: true
        default: 'MyApp'
      zip_url:
        description: 'URL download file ZIP project'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Download & Extract ZIP
        run: |
          echo "Mengunduh project ZIP..."
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          echo "Ukuran ZIP: $(du -sh project.zip | cut -f1)"
          mkdir -p project_src
          unzip -q project.zip -d project_src
          PUBSPEC=$(find project_src -name "pubspec.yaml" | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC")
          PROJECT_DIR=$(realpath "$PROJECT_DIR")
          echo "Project ditemukan di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Flutter pub get
        run: |
          echo "Project dir: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "release" ]; then
            flutter build apk --release --no-tree-shake-icons
            APK_PATH=$(find "$PROJECT_DIR" -name "app-release.apk" | head -1)
          else
            flutter build apk --debug --no-tree-shake-icons
            APK_PATH=$(find "$PROJECT_DIR" -name "app-debug.apk" | head -1)
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK ditemukan: $APK_PATH"

      - name: Rename APK
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          MODE="${{ github.event.inputs.mode }}"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          NEW_NAME="${SAFE_NAME}-${MODE}.apk"
          cp "$APK_PATH" "/tmp/$NEW_NAME"
          echo "FINAL_APK=/tmp/$NEW_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$(du -sh /tmp/$NEW_NAME | cut -f1)" >> $GITHUB_ENV
          echo "APK renamed: $NEW_NAME"

      - name: Kirim APK ke Telegram
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          MODE="${{ github.event.inputs.mode }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          JOB_ID="${{ github.event.inputs.job_id }}"

          NOTIF_TEXT="✅ Build Berhasil!%0AApp: ${APP_NAME}%0AMode: ${MODE}%0AUkuran: ${APK_SIZE}%0AJob ID: ${JOB_ID}%0A%0AAPK sedang dikirim... 📦"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${NOTIF_TEXT}"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "document=@${FINAL_APK}" \
            -F "caption=📦 ${APP_NAME} - ${MODE} | ${APK_SIZE} | ✅ GitHub Actions"

      - name: Kirim Notif Gagal ke Telegram
        if: failure()
        run: |
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          MODE="${{ github.event.inputs.mode }}"

          FAIL_TEXT="❌ Build Gagal!%0AApp: ${APP_NAME}%0AMode: ${MODE}%0A%0ACek log GitHub Actions untuk detail error.%0ACredit dikembalikan otomatis."

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${FAIL_TEXT}"
